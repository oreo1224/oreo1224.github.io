<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amazonリンクジャンプ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #111827;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.04em;
      line-height: 1.15;
    }

    p {
      margin: 0 0 22px;
      color: #6b7280;
      line-height: 1.7;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 52px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #ff9900;
      box-shadow: 0 0 0 4px rgba(255, 153, 0, 0.16);
    }

    button {
      width: 100%;
      height: 54px;
      margin-top: 14px;
      border: 0;
      border-radius: 12px;
      background: #ff9900;
      color: #111827;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: #ed8b00;
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      color: #dc2626;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .hint {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.7;
    }

    .hint code {
      color: #374151;
      background: #f3f4f6;
      padding: 2px 5px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Amazonリンクジャンプ</h1>
    <p>Amazonの商品URL、またはASINを入力して、アフィリエイトリンクでAmazonへ移動します。</p>

    <form id="form">
      <label for="amazonInput">Amazon商品URL / ASIN</label>
      <input
        id="amazonInput"
        type="text"
        placeholder="https://www.amazon.co.jp/dp/B0XXXXXXXX または B0XXXXXXXX"
        autocomplete="off"
        autofocus
      />

      <button type="submit">Amazonへジャンプ</button>
      <div id="message" class="message" aria-live="polite"></div>
    </form>

    <div class="hint">
      対応形式：<br>
      <code>https://www.amazon.co.jp/dp/ASIN</code><br>
      <code>https://www.amazon.co.jp/gp/product/ASIN</code><br>
      <code>ASINのみ</code>
    </div>
  </main>

  <script>
    const TRACKING_ID = "oreo1224-22";
    const MARKETPLACE = "amazon.co.jp";

    const form = document.getElementById("form");
    const input = document.getElementById("amazonInput");
    const message = document.getElementById("message");

    function extractAsin(value) {
      const text = value.trim();

      if (!text) return null;

      const patterns = [
        /\/dp\/([A-Z0-9]{10})(?:[/?#]|$)/i,
        /\/gp\/product\/([A-Z0-9]{10})(?:[/?#]|$)/i,
        /\/product\/([A-Z0-9]{10})(?:[/?#]|$)/i,
        /(?:ASIN=|asin=)([A-Z0-9]{10})(?:[&?#]|$)/i,
        /^([A-Z0-9]{10})$/i
      ];

      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match) {
          return match[1].toUpperCase();
        }
      }

      return null;
    }

    function buildAffiliateUrl(asin) {
      return `https://www.${MARKETPLACE}/dp/${asin}?tag=${encodeURIComponent(TRACKING_ID)}`;
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const asin = extractAsin(input.value);

      if (!asin) {
        message.textContent = "ASINを取得できませんでした。Amazonの商品URL、または10桁のASINを入力してください。";
        input.focus();
        return;
      }

      message.textContent = "";
      const affiliateUrl = buildAffiliateUrl(asin);

      window.location.href = affiliateUrl;
    });
  </script>
</body>
</html>
